<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Access path decision flow</title>
  <desc id="desc">Large cards show how authors choose one attendee access path, map credentials, decide provisioning, and define the expected starting screen.</desc>
  <rect width="1200" height="640" fill="#f7f7f5"/>
  <text x="70" y="56" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1f1f1f">Choose one access path</text>
  <g font-family="Arial, sans-serif" fill="#1f1f1f">
    <g class="card">
      <rect x="70" y="100" width="500" height="150" rx="8" fill="#ffffff" stroke="#466b7a" stroke-width="3"/>
      <text x="100" y="140" font-size="22" font-weight="700">1. Pick one primary path</text>
      <text x="100" y="176" font-size="18">Choose event code, sandbox, customer tenancy,</text>
      <text x="100" y="202" font-size="18">early start, or live provisioning.</text>
      <text x="100" y="228" font-size="18">Support only that path during the event.</text>
    </g>
    <g class="card">
      <rect x="630" y="100" width="500" height="150" rx="8" fill="#ffffff" stroke="#466b7a" stroke-width="3"/>
      <text x="660" y="140" font-size="22" font-weight="700">2. Map credentials</text>
      <text x="660" y="176" font-size="18">List each account, event code, OCI user,</text>
      <text x="660" y="202" font-size="18">database user, app user, key, or password</text>
      <text x="660" y="228" font-size="18">that attendees need for the selected path.</text>
    </g>
    <g class="card">
      <rect x="70" y="310" width="500" height="150" rx="8" fill="#ffffff" stroke="#466b7a" stroke-width="3"/>
      <text x="100" y="350" font-size="22" font-weight="700">3. Decide provisioning</text>
      <text x="100" y="386" font-size="18">Confirm whether lab spaces start early</text>
      <text x="100" y="412" font-size="18">or during the call. Prepare content for</text>
      <text x="100" y="438" font-size="18">any wait time.</text>
    </g>
    <g class="card">
      <rect x="630" y="310" width="500" height="150" rx="8" fill="#ffffff" stroke="#466b7a" stroke-width="3"/>
      <text x="660" y="350" font-size="22" font-weight="700">4. Define the first screen</text>
      <text x="660" y="386" font-size="18">Name the page title, visible button,</text>
      <text x="660" y="412" font-size="18">booking status, region, compartment,</text>
      <text x="660" y="438" font-size="18">or service page attendees should see.</text>
    </g>
    <g class="card">
      <rect x="70" y="520" width="1060" height="72" rx="8" fill="#eaf2f5" stroke="#7296a5" stroke-width="3"/>
      <text x="100" y="565" font-size="20" font-weight="700">Rule:</text>
      <text x="160" y="565" font-size="20">choose one path, test it, document it, and support it during the event.</text>
    </g>
  </g>
</svg>
