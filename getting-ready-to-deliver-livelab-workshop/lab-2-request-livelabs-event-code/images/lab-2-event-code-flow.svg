<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">LiveLabs event, access, and capacity flow</title>
  <desc id="desc">Five cards show collecting event details, choosing one access path, planning capacity, requesting the event code, and verifying the attendee handoff.</desc>
  <rect width="1200" height="620" fill="#f7f7f5"/>
  <g font-family="Arial, sans-serif" fill="#1f1f1f">
    <text x="60" y="55" font-size="32" font-weight="700">Plan the event code, access path, and capacity</text>
    <g><rect x="60" y="90" width="340" height="170" rx="8" fill="#fff" stroke="#7f5f4a" stroke-width="3"/><text x="85" y="130" font-size="21" font-weight="700">1. Collect event details</text><text x="85" y="166" font-size="17">Workshop ID, dates, time zone,</text><text x="85" y="192" font-size="17">request owner, and expected size.</text></g>
    <g><rect x="430" y="90" width="340" height="170" rx="8" fill="#fff" stroke="#7f5f4a" stroke-width="3"/><text x="455" y="130" font-size="21" font-weight="700">2. Choose one path</text><text x="455" y="166" font-size="17">Event code, green-button sandbox,</text><text x="455" y="192" font-size="17">or brown-button own tenancy.</text></g>
    <g><rect x="800" y="90" width="340" height="170" rx="8" fill="#fff" stroke="#7f5f4a" stroke-width="3"/><text x="825" y="130" font-size="21" font-weight="700">3. Plan capacity</text><text x="825" y="166" font-size="17">For 50+, confirm capacity and</text><text x="825" y="192" font-size="17">pre-provision with LiveLabs.</text></g>
    <g><rect x="245" y="320" width="340" height="170" rx="8" fill="#fff" stroke="#7f5f4a" stroke-width="3"/><text x="270" y="360" font-size="21" font-weight="700">4. Request and review</text><text x="270" y="396" font-size="17">Populate fields, user counts,</text><text x="270" y="422" font-size="17">links, and reservation timing.</text></g>
    <g><rect x="615" y="320" width="340" height="170" rx="8" fill="#fff" stroke="#7f5f4a" stroke-width="3"/><text x="640" y="360" font-size="21" font-weight="700">5. Verify the handoff</text><text x="640" y="396" font-size="17">Test the event link and first screen;</text><text x="640" y="422" font-size="17">send account and support guidance.</text></g>
    <rect x="60" y="540" width="1080" height="48" rx="8" fill="#f6eee8" stroke="#b48a6b" stroke-width="3"/><text x="85" y="571" font-size="18" font-weight="700">If reservations are live, use the opening buffer for prerequisites and product context before hands-on work begins.</text>
  </g>
</svg>