<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Issue triage flow</title>
  <desc id="desc">Four large cards show how authors triage access issues, use LiveLabs Help, report evidence, and keep the event moving.</desc>
  <rect width="1200" height="620" fill="#f7f7f5"/>
  <text x="70" y="56" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1f1f1f">Troubleshoot common issues</text>
  <g font-family="Arial, sans-serif" fill="#1f1f1f">
    <g class="card">
      <rect x="70" y="100" width="500" height="150" rx="8" fill="#ffffff" stroke="#806b54" stroke-width="3"/>
      <text x="100" y="140" font-size="22" font-weight="700">1. Identify the blocker</text>
      <text x="100" y="176" font-size="18">Start with the attendee screen, access path,</text>
      <text x="100" y="202" font-size="18">account state, event code, sandbox status,</text>
      <text x="100" y="228" font-size="18">network state, or OCI location.</text>
    </g>
    <g class="card">
      <rect x="630" y="100" width="500" height="150" rx="8" fill="#ffffff" stroke="#806b54" stroke-width="3"/>
      <text x="660" y="140" font-size="22" font-weight="700">2. Choose the live route</text>
      <text x="660" y="176" font-size="18">Pause the group for common blockers.</text>
      <text x="660" y="202" font-size="18">Keep moving when one or two attendees</text>
      <text x="660" y="228" font-size="18">need chat, breakout, or watch-only help.</text>
    </g>
    <g class="card">
      <rect x="70" y="300" width="500" height="150" rx="8" fill="#ffffff" stroke="#806b54" stroke-width="3"/>
      <text x="100" y="340" font-size="22" font-weight="700">3. Log persistent issues</text>
      <text x="100" y="376" font-size="18">Record issues the team cannot solve</text>
      <text x="100" y="402" font-size="18">during the event, including sandbox,</text>
      <text x="100" y="428" font-size="18">provisioning, or workshop-content failures.</text>
    </g>
    <g class="card">
      <rect x="630" y="300" width="500" height="150" rx="8" fill="#f6eee8" stroke="#b48a6b" stroke-width="3"/>
      <text x="660" y="340" font-size="22" font-weight="700">4. Report with evidence</text>
      <text x="660" y="376" font-size="18">After the event, report unresolved issues</text>
      <text x="660" y="402" font-size="18">in #livelabs-authors-help. Include the</text>
      <text x="660" y="428" font-size="18">workshop, lab step, path, error, and proof.</text>
    </g>
    <g class="card">
      <rect x="70" y="500" width="1060" height="72" rx="8" fill="#f6eee8" stroke="#b48a6b" stroke-width="3"/>
      <text x="100" y="545" font-size="20" font-weight="700">Goal:</text>
      <text x="160" y="545" font-size="20">fix what can be fixed live, and report persistent technical issues clearly.</text>
    </g>
  </g>
</svg>
