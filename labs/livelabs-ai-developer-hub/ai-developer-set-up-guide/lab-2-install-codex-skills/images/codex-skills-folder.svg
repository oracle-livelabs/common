<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex skills folder layout</title>
  <desc id="desc">Diagram of skill zip files expanding into the Codex skills folder and being tested after restart.</desc>
  <rect width="1100" height="520" fill="#fbf9f7"/>
  <rect x="0" y="0" width="1100" height="12" fill="#007d7e"/>
  <text x="60" y="72" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#312d2a">Install skills into Codex</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5f5751"/></marker></defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="60" y="145" width="300" height="220" fill="#fff" stroke="#d7d0c8" stroke-width="2"/>
    <text x="90" y="190" font-size="22" font-weight="700" fill="#312d2a">Shared folder</text>
    <text x="90" y="230" font-size="16" fill="#5f5751">livelabs-author.zip</text>
    <text x="90" y="260" font-size="16" fill="#5f5751">livestacks-orchestrator.zip</text>
    <text x="90" y="290" font-size="16" fill="#5f5751">freesql.zip</text>
    <text x="90" y="320" font-size="16" fill="#5f5751">oracle-db-skills-main.zip</text>
    <line x1="380" y1="255" x2="410" y2="255" stroke="#5f5751" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="430" y="145" width="390" height="220" fill="#fff" stroke="#d7d0c8" stroke-width="2"/>
    <text x="460" y="190" font-size="22" font-weight="700" fill="#312d2a">Codex skills folder</text>
    <text x="460" y="230" font-size="16" fill="#5f5751">macOS: ~/.codex/skills</text>
    <text x="460" y="260" font-size="16" fill="#5f5751">Windows: %USERPROFILE%\.codex\skills</text>
    <text x="460" y="305" font-size="16" fill="#5f5751">Each skill folder contains SKILL.md.</text>
    <line x1="840" y1="255" x2="880" y2="255" stroke="#5f5751" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="900" y="145" width="150" height="220" fill="#312d2a"/>
    <text x="930" y="208" font-size="22" font-weight="700" fill="#fff">Restart</text>
    <text x="930" y="242" font-size="16" fill="#fff">then test</text>
    <text x="930" y="278" font-size="16" fill="#fff">with $skill</text>
  </g>
</svg>
