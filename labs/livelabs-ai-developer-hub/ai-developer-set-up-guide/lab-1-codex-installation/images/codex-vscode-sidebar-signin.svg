<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">VS Code Codex sidebar sign-in</title>
  <desc id="desc">Screenshot-style guide for opening the Codex sidebar after the IDE extension is installed and signing in.</desc>
  <rect width="1200" height="720" fill="#fbf9f7"/>
  <rect x="0" y="0" width="1200" height="12" fill="#b25f00"/>
  <text x="60" y="70" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#312d2a">Open Codex in VS Code and sign in</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="70" y="115" width="1060" height="520" fill="#1e1e1e" stroke="#d7d0c8" stroke-width="2"/>
    <rect x="70" y="115" width="72" height="520" fill="#333333"/>
    <rect x="142" y="115" width="568" height="520" fill="#1e1e1e"/>
    <rect x="710" y="115" width="420" height="520" fill="#252526"/>
    <circle cx="106" cy="155" r="15" fill="#5f5751"/>
    <circle cx="106" cy="215" r="15" fill="#5f5751"/>
    <circle cx="106" cy="275" r="15" fill="#007d7e"/>
    <text x="90" y="281" font-size="17" font-weight="700" fill="#ffffff">C</text>
    <text x="185" y="170" font-size="24" font-weight="700" fill="#ffffff">ai-developer-training</text>
    <rect x="185" y="210" width="440" height="320" fill="#252526" stroke="#3c3c3c"/>
    <text x="220" y="255" font-size="18" fill="#cccccc">Open the same workspace folder.</text>
    <text x="220" y="292" font-size="18" fill="#cccccc">Review files and diffs here.</text>
    <text x="740" y="165" font-size="22" font-weight="700" fill="#ffffff">Codex</text>
    <text x="740" y="215" font-size="17" fill="#cccccc">Sign in to start using Codex.</text>
    <rect x="740" y="255" width="310" height="44" fill="#007acc"/>
    <text x="830" y="283" font-size="18" font-weight="700" fill="#ffffff">Sign in</text>
    <rect x="740" y="330" width="310" height="120" fill="#1e1e1e" stroke="#3c3c3c"/>
    <text x="765" y="370" font-size="16" fill="#cccccc">Use your approved account path.</text>
    <text x="765" y="402" font-size="16" fill="#cccccc">Restart VS Code if Codex</text>
    <text x="765" y="430" font-size="16" fill="#cccccc">does not appear.</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="70" y="650" width="1060" height="46" fill="#312d2a"/>
    <text x="95" y="680" font-size="17" fill="#ffffff">Step 3: After install, open the Codex sidebar, sign in, and confirm the training workspace is open.</text>
  </g>
</svg>
