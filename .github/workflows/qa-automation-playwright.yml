name: QA Automation Playwright

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "qa-automation/**"
      - ".github/workflows/qa-automation-playwright.yml"
  push:
    branches:
      - main
    paths:
      - "qa-automation/**"
      - ".github/workflows/qa-automation-playwright.yml"

jobs:
  smoke:
    name: Public smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qa-automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: qa-automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Doctor
        run: node ./scripts/qa.mjs doctor

      - name: Typecheck
        run: npm run typecheck

      - name: Collect tests
        run: npm run test:collect

      - name: Run public smoke
        run: node ./scripts/qa.mjs tests/platform/smoke --retries 1

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-automation-smoke-artifacts
          path: qa-automation/artifacts/platform/smoke
          if-no-files-found: warn
